version: 2

updates:
  # Python runtime + dev dependencies declared in pyproject.toml
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
      prefix-development: deps-dev

  # The SHA-pinned GitHub Actions in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci
