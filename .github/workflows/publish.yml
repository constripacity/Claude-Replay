name: Publish to PyPI

# Publishes on a version tag push (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored anywhere.
# Configure the trusted publisher once at https://pypi.org/manage/account/publishing/
#   PyPI project: claude-replay
#   Owner: constripacity   Repo: Claude-Replay
#   Workflow: publish.yml   Environment: pypi

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check metadata
        run: python -m twine check dist/*

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="v$(python -c 'import claude_replay; print(claude_replay.__version__)')"
          TAG="${GITHUB_REF_NAME}"
          echo "package=$PKG_VERSION  tag=$TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Tag $TAG does not match package version $PKG_VERSION"
            exit 1
          fi

      - name: Upload built distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/claude-replay/
    permissions:
      id-token: write   # OIDC token for Trusted Publishing — the only privilege needed
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          skip-existing: true   # never error if a version is already on PyPI
