<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Replay — Dashboard</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #11151f; --panel-2: #161b27; --line: #232a3b;
    --fg: #c5cdd9; --muted: #6b7689; --accent: #5ccfe6; --green: #95e6cb;
    --yellow: #ffd580; --red: #ff6b7a;
    --mono: "IBM Plex Mono", "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--mono); font-size: 13px; line-height: 1.5; }
  header.top { display: flex; align-items: baseline; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--line); background: var(--panel); }
  header.top h1 { font-size: 15px; margin: 0; letter-spacing: 0.5px; }
  header.top .meta { color: var(--muted); font-size: 12px; }
  .live { color: var(--green); }
  .layout { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 49px); }
  .list { overflow-y: auto; border-right: 1px solid var(--line); }
  .detail { overflow-y: auto; padding: 20px 24px; }
  .row { padding: 12px 16px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .row:hover { background: var(--panel-2); }
  .row.active { background: #10202a; border-left: 3px solid var(--accent); }
  .row .obj { color: var(--fg); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .sub { color: var(--muted); font-size: 11px; display: flex; gap: 10px; flex-wrap: wrap; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border: 1px solid var(--line); }
  .status-running { color: var(--yellow); border-color: var(--yellow); }
  .status-completed { color: var(--green); border-color: var(--green); }
  .status-interrupted { color: var(--yellow); border-color: var(--yellow); }
  .status-error { color: var(--red); border-color: var(--red); }
  .death-clean_finish { color: var(--green); border-color: var(--green); }
  .death-interrupted { color: var(--yellow); border-color: var(--yellow); }
  .death-rate_limit, .death-context_overflow, .death-api_error { color: var(--red); border-color: var(--red); }
  .death-never_started, .death-unknown { color: var(--muted); border-color: var(--line); }
  .tag { display: inline-block; padding: 0 6px; border-radius: 3px; font-size: 10px; color: var(--accent); border: 1px solid var(--line); background: #0a0d13; }
  .name { color: var(--accent); }
  .search { margin-left: auto; }
  .search input { background: var(--panel-2); color: var(--fg); border: 1px solid var(--line); border-radius: 3px; padding: 4px 10px; font-family: var(--mono); font-size: 12px; width: 220px; }
  .search input:focus { outline: none; border-color: var(--accent); }
  .matchcount { color: var(--green); }
  .group { padding: 8px 16px 4px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--line); background: var(--panel); position: sticky; top: 0; }
  pre.snippet { margin: 4px 0 0; padding: 4px 8px; background: #0a0d13; border: 1px solid var(--line); border-radius: 3px; white-space: pre-wrap; word-break: break-word; color: var(--muted); font-size: 11px; }
  h2 { font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 24px 0 10px; }
  dl.meta { display: grid; grid-template-columns: 130px 1fr; gap: 3px 14px; margin: 0 0 8px; }
  dl.meta dt { color: var(--muted); }
  dl.meta dd { margin: 0; word-break: break-word; }
  .evt { display: grid; grid-template-columns: 48px 80px 1fr; gap: 8px; padding: 6px 10px; border-bottom: 1px solid var(--line); background: var(--panel); }
  .evt:nth-child(even) { background: var(--panel-2); }
  .evt .seq, .evt .ts { color: var(--muted); font-size: 11px; }
  .evt .tname { color: var(--accent); }
  .evt-checkpoint { border-left: 3px solid var(--accent); background: #10202a; }
  .evt-error { border-left: 3px solid var(--red); }
  pre.preview { margin: 4px 0 0; padding: 6px 8px; background: #0a0d13; border: 1px solid var(--line); border-radius: 3px; white-space: pre-wrap; word-break: break-word; color: var(--muted); font-size: 11px; max-height: 140px; overflow: auto; }
  .actions { display: flex; gap: 10px; margin: 12px 0 4px; }
  button { background: var(--panel-2); color: var(--accent); border: 1px solid var(--accent); border-radius: 3px; padding: 5px 14px; font-family: var(--mono); font-size: 12px; cursor: pointer; }
  button:hover { background: var(--accent); color: var(--bg); }
  .empty { color: var(--muted); padding: 40px 20px; text-align: center; }
  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--panel-2); border: 1px solid var(--accent); color: var(--accent); padding: 10px 16px; border-radius: 4px; opacity: 0; transition: opacity .2s; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header class="top">
  <h1>Claude Replay</h1>
  <span class="meta" id="meta">connecting…</span>
  <span class="meta live" id="live"></span>
  <span class="search"><input id="q" type="search" placeholder="search sessions…" autocomplete="off"></span>
</header>
<div class="layout">
  <div class="list" id="list"><div class="empty">Loading sessions…</div></div>
  <div class="detail" id="detail"><div class="empty">Select a session to inspect its timeline.</div></div>
</div>
<div class="toast" id="toast"></div>
<script>
  var state = { sessions: [], active: null, query: "", results: [], compareA: null };

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
    });
  }
  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg; t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 1800);
  }

  function badge(status) {
    return '<span class="badge status-' + esc(status) + '">' + esc(status) + "</span>";
  }
  function deathBadge(s) {
    if (!s.death_label) return "";
    // Skip the redundant "Clean finish" on already-completed sessions.
    if (s.death_cause === "clean_finish" && s.status === "completed") return "";
    return '<span class="badge death-' + esc(s.death_cause) + '">' + esc(s.death_label) + "</span>";
  }
  function tagsHtml(s) {
    if (!s.tags || !s.tags.length) return "";
    return s.tags.map(function (t) { return '<span class="tag">' + esc(t) + "</span>"; }).join(" ");
  }
  function rowTitle(s) {
    return s.name
      ? '<span class="name">' + esc(s.name) + "</span>"
      : esc(s.objective || "(no objective)");
  }

  function sessionRow(s, extra) {
    var active = s.id === state.active ? " active" : "";
    return '<div class="row' + active + '" data-id="' + esc(s.id) + '">' +
      '<div class="obj">' + rowTitle(s) + "</div>" +
      '<div class="sub">' + badge(s.status) + deathBadge(s) +
      "<span>" + esc(s.model || "—") + "</span>" +
      "<span>" + s.events + " ev</span><span>" + s.checkpoints + " ckpt</span>" +
      "<span>" + esc(s.id_short) + "</span>" + tagsHtml(s) + "</div>" +
      (extra || "") + "</div>";
  }

  function bindRows(el) {
    Array.prototype.forEach.call(el.querySelectorAll(".row"), function (row) {
      row.onclick = function () { select(row.getAttribute("data-id")); };
    });
  }

  function renderList() {
    var el = document.getElementById("list");
    if (state.query) {
      if (!state.results.length) { el.innerHTML = '<div class="empty">No matches for “' + esc(state.query) + '”.</div>'; return; }
      el.innerHTML = state.results.map(function (r) {
        var snip = r.snippet ? '<pre class="snippet">' + esc(r.snippet) + "</pre>" : "";
        var count = '<span class="matchcount">' + r.matches + ' match' + (r.matches === 1 ? "" : "es") + "</span>";
        return sessionRow(r.session, '<div class="sub">' + count + "</div>" + snip);
      }).join("");
      bindRows(el);
      return;
    }
    if (!state.sessions.length) { el.innerHTML = '<div class="empty">No sessions recorded yet.</div>'; return; }
    // Group by project_dir, preserving the (recency-sorted) order of first appearance.
    var groups = [], byPath = {};
    state.sessions.forEach(function (s) {
      var p = s.project_dir || "(no project)";
      if (!byPath[p]) { byPath[p] = []; groups.push(p); }
      byPath[p].push(s);
    });
    el.innerHTML = groups.map(function (p) {
      return '<div class="group" title="' + esc(p) + '">' + esc(shortProject(p)) + "</div>" +
        byPath[p].map(function (s) { return sessionRow(s); }).join("");
    }).join("");
    bindRows(el);
  }

  function shortProject(path) {
    if (!path || path === "(no project)") return "(no project)";
    var parts = String(path).replace(/[\\/]+$/, "").split(/[\\/]/);
    return parts[parts.length - 1] || path;
  }

  function doSearch(q) {
    state.query = q;
    if (!q) { renderList(); return; }
    fetch("/api/search?q=" + encodeURIComponent(q)).then(function (r) { return r.json(); }).then(function (d) {
      if (state.query !== q) return;  // a newer keystroke already superseded this
      state.results = d.results || [];
      renderList();
    });
  }

  function select(id) {
    // If a compare is armed and a different session is clicked, diff them.
    if (state.compareA && state.compareA !== id) {
      var a = state.compareA; state.compareA = null;
      state.active = id; renderList();
      fetch("/api/diff?a=" + encodeURIComponent(a) + "&b=" + encodeURIComponent(id))
        .then(function (r) { return r.json(); }).then(renderDiff);
      return;
    }
    state.active = id;
    renderList();
    fetch("/api/session/" + encodeURIComponent(id)).then(function (r) { return r.json(); }).then(renderDetail);
  }

  function startCompare(id) {
    state.compareA = id;
    toast("Compare armed — click another session");
  }

  function renderDiff(d) {
    if (d.error) { document.getElementById("detail").innerHTML = '<div class="empty">' + esc(d.error) + "</div>"; return; }
    var am = d.a.metrics, bm = d.b.metrics;
    function rowm(label, key, human) {
      var av = human ? am[human] : am[key], bv = human ? bm[human] : bm[key];
      var delta = d.deltas[key];
      var ds = delta ? '  <span class="matchcount">(Δ ' + (delta > 0 ? "+" : "") + delta + ")</span>" : "";
      return "<dt>" + esc(label) + "</dt><dd>" + esc(av) + "  →  " + esc(bv) + ds + "</dd>";
    }
    var fileLines = "";
    if (d.files.only_a.length) fileLines += "<dt>only in A</dt><dd>" + esc(d.files.only_a.join(", ")) + "</dd>";
    if (d.files.only_b.length) fileLines += "<dt>only in B</dt><dd>" + esc(d.files.only_b.join(", ")) + "</dd>";
    if (d.files.both.length) fileLines += "<dt>in both</dt><dd>" + esc(d.files.both.join(", ")) + "</dd>";
    document.getElementById("detail").innerHTML =
      "<h2>Compare</h2>" +
      '<dl class="meta">' +
        "<dt>A</dt><dd>" + esc(d.a.session.id_short || d.a.session.id) + "  " + esc(d.a.session.name || d.a.session.objective || "") + "</dd>" +
        "<dt>B</dt><dd>" + esc(d.b.session.id_short || d.b.session.id) + "  " + esc(d.b.session.name || d.b.session.objective || "") + "</dd>" +
        "<dt>how it ended</dt><dd>" + esc(am.death_label) + "  →  " + esc(bm.death_label) + "</dd>" +
        rowm("duration", "duration_seconds", "duration_human") +
        rowm("tool calls", "tool_calls") +
        rowm("errors", "error_count") +
        rowm("files touched", "files_touched") +
        fileLines +
      "</dl>";
  }

  function renderDetail(data) {
    if (data.error) { document.getElementById("detail").innerHTML = '<div class="empty">' + esc(data.error) + "</div>"; return; }
    var s = data.session;
    var summary = (state.sessions.concat(state.results.map(function (r) { return r.session; }))
      ).filter(function (x) { return x.id === s.id; })[0] || {};
    var meta = [
      ["Session", s.id],
    ];
    if (summary.name) meta.push(["Name", summary.name]);
    meta.push(
      ["Objective", s.objective || "(not recorded)"],
      ["Status", s.status],
      ["How it ended", summary.death_label || "—"],
      ["Model", s.model || "(unknown)"],
      ["Project", s.project_dir || "—"], ["Started", s.started_at],
      ["Ended", s.ended_at || "— (running / interrupted)"]
    );
    if (summary.tags && summary.tags.length) meta.push(["Tags", summary.tags.join(", ")]);
    if (s.error_msg) meta.push(["Error", s.error_msg]);
    var metaHtml = meta.map(function (kv) { return "<dt>" + esc(kv[0]) + "</dt><dd>" + esc(kv[1]) + "</dd>"; }).join("");

    var items = [];
    data.events.forEach(function (e) { items.push({ ts: e.timestamp, kind: "event", o: e }); });
    data.checkpoints.forEach(function (c) { items.push({ ts: c.timestamp, kind: "checkpoint", o: c }); });
    items.sort(function (a, b) { return a.ts < b.ts ? -1 : a.ts > b.ts ? 1 : (a.kind === "checkpoint") - (b.kind === "checkpoint"); });

    var timeline = items.map(function (it) {
      var o = it.o;
      if (it.kind === "checkpoint") {
        var body = esc(o.step_done || "") + (o.step_next ? "\n→ next: " + esc(o.step_next) : "");
        return '<div class="evt evt-checkpoint"><span class="seq">cp' + o.seq + '</span><span class="ts">' +
          esc(o.timestamp) + '</span><div><span class="tname">checkpoint</span><pre class="preview">' + body + "</pre></div></div>";
      }
      var name = esc(o.tool_name || o.event_type);
      var preview = o.tool_input || o.tool_result || o.error_msg || "";
      var p = preview ? '<pre class="preview">' + esc(String(preview).slice(0, 600)) + "</pre>" : "";
      return '<div class="evt evt-' + esc(o.event_type) + '"><span class="seq">#' + o.seq + '</span><span class="ts">' +
        esc(o.timestamp) + '</span><div><span class="tname">' + name + "</span>" + p + "</div></div>";
    }).join("");

    var m = data.metrics;
    var insightsHtml = "";
    if (m) {
      var topTools = (m.top_tools || []).map(function (t) { return esc(t[0]) + "×" + t[1]; }).join("  ");
      var insights = [
        ["Duration", m.duration_human],
        ["Tool calls", m.tool_calls + (m.error_count ? "  (" + m.error_count + " err, " + Math.round(m.error_rate * 100) + "%)" : "")],
        ["Files touched", m.files_touched],
      ];
      if (topTools) insights.push(["Top tools", topTools]);
      insightsHtml = "<h2>Insights</h2><dl class=\"meta\">" +
        insights.map(function (kv) { return "<dt>" + esc(kv[0]) + "</dt><dd>" + esc(kv[1]) + "</dd>"; }).join("") +
        "</dl>";
    }

    document.getElementById("detail").innerHTML =
      "<h2>" + badge(s.status) + "&nbsp; Session detail</h2>" +
      '<div class="actions"><button onclick="copyBrief(\'' + esc(s.id) + '\')">Copy Resume Brief</button>' +
      '<button onclick="exportHtml(\'' + esc(s.id) + '\')">Export HTML</button>' +
      '<button onclick="startCompare(\'' + esc(s.id) + '\')">Compare ▾</button></div>' +
      '<dl class="meta">' + metaHtml + "</dl>" +
      insightsHtml +
      "<h2>Timeline</h2>" + (timeline || '<div class="empty">No events.</div>');
  }

  function copyBrief(id) {
    fetch("/api/resume/" + encodeURIComponent(id)).then(function (r) { return r.json(); }).then(function (d) {
      var text = d.brief || "";
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function () { toast("Resume brief copied"); }, function () { toast("Copy failed"); });
      } else { toast("Clipboard unavailable"); }
    });
  }

  function exportHtml(id) {
    fetch("/api/export/" + encodeURIComponent(id)).then(function (r) { return r.json(); }).then(function (d) {
      toast(d.path ? "Exported → " + d.path : (d.error || "Export failed"));
    });
  }

  function poll() {
    fetch("/api/state").then(function (r) { return r.json(); }).then(function (data) {
      state.sessions = data.sessions || [];
      document.getElementById("meta").textContent =
        "v" + data.version + " · " + data.total_sessions + " sessions · up " + data.uptime_human;
      document.getElementById("live").textContent = "● live";
      if (!state.query) renderList();  // don't clobber an active search
      if (!state.active && state.sessions.length) select(state.sessions[0].id);
    }).catch(function () { document.getElementById("live").textContent = "● offline"; });
  }

  var qInput = document.getElementById("q");
  var qTimer = null;
  qInput.addEventListener("input", function () {
    var v = qInput.value.trim();
    if (qTimer) clearTimeout(qTimer);
    qTimer = setTimeout(function () { doSearch(v); }, 180);
  });

  poll();
  setInterval(poll, 2000);
</script>
</body>
</html>
