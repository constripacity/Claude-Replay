<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #11151f;
    --panel-2: #161b27;
    --line: #232a3b;
    --fg: #c5cdd9;
    --muted: #6b7689;
    --accent: #5ccfe6;
    --green: #95e6cb;
    --yellow: #ffd580;
    --red: #ff6b7a;
    --mono: "IBM Plex Mono", "Geist Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.55;
  }
  .trace { max-width: 960px; margin: 0 auto; padding: 32px 20px 80px; }
  h1 { font-size: 18px; margin: 0 0 4px; letter-spacing: 0.5px; }
  h2 { font-size: 14px; margin: 32px 0 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
  a { color: var(--accent); }
  header .sub { color: var(--muted); margin-bottom: 16px; }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 3px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    border: 1px solid var(--line);
  }
  .status-running { color: var(--yellow); border-color: var(--yellow); }
  .status-completed { color: var(--green); border-color: var(--green); }
  .status-interrupted { color: var(--yellow); border-color: var(--yellow); }
  .status-error { color: var(--red); border-color: var(--red); }
  dl.meta { display: grid; grid-template-columns: 140px 1fr; gap: 4px 16px; margin: 16px 0; }
  dl.meta dt { color: var(--muted); }
  dl.meta dd { margin: 0; word-break: break-word; }
  .timeline { border-left: 2px solid var(--line); padding-left: 0; }
  .evt {
    display: grid; grid-template-columns: 56px 90px 1fr; gap: 8px;
    padding: 8px 12px; border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .evt:nth-child(even) { background: var(--panel-2); }
  .evt .seq { color: var(--muted); }
  .evt .ts { color: var(--muted); font-size: 11px; }
  .evt .body { min-width: 0; }
  .evt .etype { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .evt .tname { color: var(--accent); margin-left: 8px; }
  .evt-tool_use .tname { color: var(--accent); }
  .evt-tool_result .tname { color: var(--green); }
  .evt-stop .etype { color: var(--yellow); }
  .evt-error { border-left: 3px solid var(--red); }
  .evt-error .etype { color: var(--red); }
  .evt-checkpoint { border-left: 3px solid var(--accent); background: #10202a; }
  .evt-checkpoint .etype { color: var(--accent); }
  pre.preview, pre.diff {
    margin: 6px 0 0; padding: 8px 10px; background: #0a0d13;
    border: 1px solid var(--line); border-radius: 3px;
    overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    color: var(--muted); font-size: 12px;
  }
  pre.diff { white-space: pre; color: var(--fg); }
  ul.files { list-style: none; padding: 0; margin: 0; }
  ul.files li { padding: 4px 0; border-bottom: 1px solid var(--line); }
  ul.files li::before { content: "›"; color: var(--accent); margin-right: 8px; }
  .brief { margin-top: 40px; }
  .brief-head { display: flex; align-items: center; justify-content: space-between; }
  #copy-btn {
    background: var(--panel-2); color: var(--accent); border: 1px solid var(--accent);
    border-radius: 3px; padding: 4px 14px; font-family: var(--mono); font-size: 12px; cursor: pointer;
  }
  #copy-btn:hover { background: var(--accent); color: var(--bg); }
  #resume-brief {
    margin-top: 12px; padding: 16px; background: var(--panel); border: 1px solid var(--line);
    border-radius: 4px; white-space: pre-wrap; word-break: break-word; color: var(--fg);
  }
  footer { margin-top: 48px; color: var(--muted); font-size: 11px; text-align: center; }
</style>
</head>
<body>
<main class="trace">
{{BODY}}
<section class="brief">
  <div class="brief-head">
    <h2>Resume Brief</h2>
    <button id="copy-btn" type="button" onclick="copyBrief()">Copy</button>
  </div>
  <pre id="resume-brief">{{RESUME_BRIEF}}</pre>
</section>
<footer>Generated by Claude Replay — self-contained trace, no external assets.</footer>
</main>
<script>
function copyBrief() {
  var el = document.getElementById('resume-brief');
  var text = el.textContent;
  var btn = document.getElementById('copy-btn');
  function done() { btn.textContent = 'Copied'; setTimeout(function () { btn.textContent = 'Copy'; }, 1500); }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done, function () {});
  } else {
    var r = document.createRange(); r.selectNode(el);
    var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(r);
    try { document.execCommand('copy'); done(); } catch (e) {}
    sel.removeAllRanges();
  }
}
</script>
</body>
</html>
